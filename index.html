<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwarussalikiin</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
  <div id="welcomeOverlay">

  <div class="welcome-card">

    <h2>أهلاً وسهلاً</h2>

    <p>Selamat datang di Anwarussalikiin</p>

    <input
      type="text"
      id="visitorName"
      placeholder="Nama Anda">

    <button id="enterSite">
      Lanjutkan
    </button>

  </div>

  </div>

<div class="animated-bg"></div>

<!-- MENU -->

<div class="menu-container">

<button id="menuBtn" class="menu-btn">
<i class="fas fa-bars"></i>
</button>

<div class="menu-items" id="menuItems">

<a href="#hero">
<i class="fas fa-home"></i>
</a>

<a href="#gallery">
<i class="fas fa-image"></i>
</a>

<a href="#links">
<i class="fas fa-link"></i>
</a>

<a href="#upload">
<i class="fas fa-upload"></i>
</a>

<a href="#contact">
<i class="fas fa-phone"></i>
</a>

</div>

</div>

<!-- HERO -->

<section id="hero" class="hero">

<h1>ANWARUSSALIKIIN</h1>

<p>
Media Informasi dan Tautan Resmi
</p>

</section>

<!-- LINKS -->

<section id="links" class="cards fade-up">

<a href="https://www.instagram.com/assalikiin.ofc?igsh=MWluYTB3cDk1Yjlvbw==" target="_blank" class="card">
<i class="fab fa-instagram"></i>
<span>Instagram</span>
</a>

<a href="https://whatsapp.com/channel/0029VbAEBCRAYlUB8fN87y3e" target="_blank" class="card">
<i class="fab fa-whatsapp"></i>
<span>Channel WhatsApp</span>
</a>

<a href="https://youtube.com/@assalikiinofficiall?si=Rax8RUGQj2PN3G0j" target="_blank" class="card">
<i class="fab fa-youtube"></i>
<span>YouTube</span>
</a>

</section>

<!-- UPLOAD -->

<section id="upload" class="fade-up">

<h2>Kirim Foto</h2>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSdR9bmNNUoFHn-TNlNr-MzRpL6oKyVku2nox_bKyDJ6DLWHwg/viewform?usp=sharing&ouid=101375306000870529762"
target="_blank"
class="upload-btn">

Kirim Foto

</a>

</section>

<!-- GALLERY -->

<section id="gallery" class="fade-up">

<h2>Galeri</h2>

<div class="slider">

<img src="images/foto1.JPG">
<img src="images/foto2.jpg">
<img src="images/foto3.jpg">
<img src="images/foto4.JPG">

</div>

</section>

<!-- CONTACT -->

<section id="rating" class="fade-up">

<div class="rating-card">

<h2>Kesan Anda?</h2>

<div class="rating-box">

<button class="emoji-rate">😍</button>

<button class="emoji-rate">😊</button>

<button class="emoji-rate">😐</button>

<button class="emoji-rate">😕</button>

<button class="emoji-rate">😞</button>
  

</div>
  <textarea
class="feedback-input"
placeholder="Tulis kesan singkat...">
  </textarea>

<p id="ratingText"></p>

</div>

</section>

<script src="main.js"></script>
  <footer class="copyright-bar">

  </footer>
